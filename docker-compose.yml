services:
  backend:
    build:
      context: ./backend/ThesisValidator
      dockerfile: ThesisValidator.Api/Dockerfile
    ports:
      - "5092:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Cors__AllowedOrigins__0=http://localhost:3000
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend/thesis-validator-frontend
      args:
        - VITE_API_URL=/api/
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy