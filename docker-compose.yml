services:
  backend:
    build:
      context: ./backend/ThesisValidator
      dockerfile: ThesisValidator.Api/Dockerfile
    ports:
      - "5092:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Cors__AllowedOrigins__0=http://localhost:3000

  frontend:
    build:
      context: ./frontend/thesis-validator-frontend
      args:
        - VITE_API_URL=/api/
        - NGINX_CONF=nginx.conf.local
    ports:
      - "3000:80"
    depends_on:
      - backend